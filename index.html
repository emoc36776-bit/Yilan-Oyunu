<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yılan Oyunu</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(33, 150, 243, 0.1);
        }
        h1 {
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 0 15px rgba(33, 150, 243, 0.7);
            color: #fff;
        }
        #score-board {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: bold;
            color: #2196F3;
            text-shadow: 0 0 5px rgba(33, 150, 243, 0.5);
        }
        canvas {
            border: 5px solid #2196F3;
            background-color: #111;
            box-shadow: 0 0 30px rgba(33, 150, 243, 0.6);
            border-radius: 6px;
        }
        .controls {
            margin-top: 20px;
            font-size: 16px;
            color: #bbb;
            text-align: center;
        }
        .wasd-highlight {
            color: #2196F3;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(33, 150, 243, 0.8);
        }
    </style>
</head>
<body>

    <h1>GÜÇLENDİRİLMİŞ YILAN!</h1>
    <div id="score-board">GÜÇ SKORU: <span id="score">0</span> / 200</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="controls">
        <span class="wasd-highlight">WASD</span> veya Ok Tuşlarını kullan!<br>
        Hedef: 200 Puana ulaşıp oyunu kazanmak!
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1;
        let dy = 0;
        let score = 0;
        const maxScore = 200; // MAKSİMUM PUAN SINIRI
        let gameSpeed = 140; 
        let gameLoop;

        const powerGlowColor = "rgba(33, 150, 243, 0.8)"; 

        function main() {
            // KAZANMA KONTROLÜ
            if (score >= maxScore) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#4CAF50";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("TEBRİKLER, KAZANDIN!", canvas.width / 2, canvas.height / 2);
                ctx.font = "20px Arial";
                ctx.fillStyle = "#fff";
                ctx.fillText("Maksimum Skor: " + score, canvas.width / 2, canvas.height / 2 + 40);
                ctx.fillText("Yeniden başlamak için tıkla.", canvas.width / 2, canvas.height / 2 + 80);
                canvas.addEventListener('click', restartGame, { once: true });
                return;
            }

            // KAYBETME KONTROLÜ
            if (hasGameEnded()) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#fff";
                ctx.font = "30px Arial";
                ctx.textAlign = "center";
                ctx.fillText("KENDİNİ ISIRDIN!", canvas.width / 2, canvas.height / 2);
                ctx.font = "20px Arial";
                ctx.fillText("Skorun: " + score, canvas.width / 2, canvas.height / 2 + 40);
                ctx.fillText("Yeniden başlamak için tıkla.", canvas.width / 2, canvas.height / 2 + 70);
                canvas.addEventListener('click', restartGame, { once: true });
                return;
            }

            clearCanvas();
            drawFood();
            moveSnake();
            drawSnake();

            setTimeout(main, gameSpeed);
        }

        function restartGame() {
            snake = [{x: 10, y: 10}];
            generateFood();
            dx = 1; dy = 0;
            score = 0;
            scoreElement.innerText = score;
            main();
        }

        generateFood();
        main();

        document.addEventListener("keydown", changeDirection);

        function clearCanvas() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                if(index === 0) {
                    ctx.fillStyle = "#2196F3"; 
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = powerGlowColor;
                } else {
                    ctx.fillStyle = "#4CAF50"; 
                    ctx.shadowBlur = 0;
                }
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                ctx.shadowBlur = 0;
            });
        }

        function moveSnake() {
            let newX = snake[0].x + dx;
            let newY = snake[0].y + dy;

            if (newX < 0) newX = tileCount - 1;
            if (newX >= tileCount) newX = 0;
            if (newY < 0) newY = tileCount - 1;
            if (newY >= tileCount) newY = 0;

            const head = {x: newX, y: newY};
            snake.unshift(head);

            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
                gameSpeed = Math.max(50, gameSpeed - 2); 
            } else {
                snake.pop();
            }
        }

        function drawFood() {
            ctx.fillStyle = "#FF5252";
            ctx.shadowBlur = 10;
            ctx.shadowColor = "rgba(255, 82, 82, 0.7)";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    generateFood();
                }
            });
        }

        function changeDirection(event) {
            const keyPressed = event.key;
            const keyLower = keyPressed.toLowerCase();

            const goingUp = (dy === -1);
            const goingDown = (dy === 1);
            const goingRight = (dx === 1);
            const goingLeft = (dx === -1);

            let tempSpeed = gameSpeed;
            if (['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright'].includes(keyLower || keyPressed)) {
                gameSpeed = Math.max(50, gameSpeed - 10);
                setTimeout(() => gameSpeed = tempSpeed, 100);
            }

            if ((keyLower === 'a' || keyPressed === 'ArrowLeft') && !goingRight) { dx = -1; dy = 0; }
            if ((keyLower === 'w' || keyPressed === 'ArrowUp') && !goingDown) { dx = 0; dy = -1; }
            if ((keyLower === 'd' || keyPressed === 'ArrowRight') && !goingLeft) { dx = 1; dy = 0; }
            if ((keyLower === 's' || keyPressed === 'ArrowDown') && !goingUp) { dx = 0; dy = 1; }
        }

        function hasGameEnded() {
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            return false;
        }
    </script>
</body>
</html>
